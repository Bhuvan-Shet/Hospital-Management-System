{% extends 'base.html' %}
{% block title %}Manage Patients{% endblock %}
{% block content %}
<div class="row mt-4">
    <div class="col-md-8">
        <h2>Manage Patients</h2>
    </div>
    <div class="col-md-4 text-end">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPatientModal">Add Patient</button>
    </div>
</div>
<hr>

<form method="GET" class="mb-3 d-flex">
    <input type="text" name="search" class="form-control me-2" placeholder="Search by name or phone..." value="{{ request.args.get('search', '') }}">
    <button type="submit" class="btn btn-outline-success">Search</button>
</form>

<table class="table table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age/Gen</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for pt in patients %}
        <tr>
            <td>{{ pt.id }}</td>
            <td>{{ pt.name }}</td>
            <td>{{ pt.age }} / {{ pt.gender }}</td>
            <td>{{ pt.phone }}</td>
            <td>
                <button class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#editPtModal{{ pt.id }}">Edit</button>
                <form action="{{ url_for('delete_patient', id=pt.id) }}" method="POST" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this patient?');">Delete</button>
                </form>
            </td>
        </tr>
        
        <!-- Edit Modal -->
        <div class="modal fade" id="editPtModal{{ pt.id }}" tabindex="-1">
            <div class="modal-dialog">
            <form action="{{ url_for('edit_patient', id=pt.id) }}" method="POST">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Patient</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2"><label>Name</label><input type="text" name="name" class="form-control" value="{{ pt.name }}" required></div>
                    <div class="mb-2"><label>Age</label><input type="number" name="age" class="form-control" value="{{ pt.age }}" required></div>
                    <div class="mb-2"><label>Gender</label>
                        <select name="gender" class="form-control">
                            <option value="Male" {% if pt.gender=='Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if pt.gender=='Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if pt.gender=='Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div class="mb-2"><label>Phone</label><input type="text" name="phone" class="form-control" value="{{ pt.phone }}" required></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
                </div>
            </form>
            </div>
        </div>
        
        {% endfor %}
    </tbody>
</table>

<!-- Add Patient Modal -->
<div class="modal fade" id="addPatientModal" tabindex="-1">
    <div class="modal-dialog">
    <form action="{{ url_for('admin_patients') }}" method="POST">
        <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Add New Patient</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <div class="mb-2"><label>Name</label><input type="text" name="name" class="form-control" required></div>
            <div class="mb-2"><label>Age</label><input type="number" name="age" class="form-control" required></div>
            <div class="mb-2"><label>Gender</label>
                <select name="gender" class="form-control">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="mb-2"><label>Phone</label><input type="text" name="phone" class="form-control" required></div>
            <hr>
            <div class="mb-2"><label>Login Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="mb-2"><label>Login Password</label><input type="password" name="password" class="form-control" required></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Add Patient</button>
        </div>
        </div>
    </form>
    </div>
</div>
{% endblock %}
